<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIG Manager V2.5 - Cloud Sync</title>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --text: #e0e0e0; --primary: #ff9800; --secondary: #00e5ff; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); padding: 20px; margin: 0; }
        .container { max-width: 500px; margin: auto; }
        h2 { color: var(--primary); text-align: center; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; background: var(--card); border: 1px solid #333; color: white; border-radius: 8px; box-sizing: border-box; }
        .btn-group { display: flex; gap: 10px; margin: 10px 0; }
        button { flex: 1; padding: 15px; border: none; font-weight: bold; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        .btn-save { background: var(--primary); color: black; width: 100%; }
        .btn-cloud { background: var(--secondary); color: black; }
        .musica-card { background: var(--card); padding: 15px; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid var(--primary); position: relative; }
        pre { background: #000; padding: 10px; overflow-x: auto; color: #00ff00; font-size: 14px; border-radius: 5px; font-family: monospace; }
        #status { font-size: 12px; color: var(--secondary); text-align: center; margin-bottom: 10px; }
        .btn-del { background: #cc0000; color: white; width: auto; padding: 5px 10px; font-size: 12px; }
    </style>
</head>
<body>

<div class="container">
    <h2>🎸 GIG Manager Pro</h2>
    <p id="status">Pronto para a noite!</p>
    
    <input type="text" id="titulo" placeholder="Nome da Música">
    <input type="text" id="artista" placeholder="Artista (Opcional)">
    
    <div class="btn-group">
        <button class="btn-cloud" onclick="importarDaNuvem()">☁️ Buscar na Nuvem</button>
    </div>

    <textarea id="cifra" rows="8" placeholder="A cifra ou letra aparecerá aqui..."></textarea>
    
    <button class="btn-save" onclick="salvar()">💾 Salvar no Repertório</button>

    <hr style="margin: 30px 0; border: 0.5px solid #333;">
    <input type="text" id="busca" placeholder="🔍 Filtrar por música ou artista..." onkeyup="renderizar()">
    
    <div id="lista"></div>
</div>

<script>
    // Usa uma chave única para evitar conflito com versões anteriores
    let repertorio = JSON.parse(localStorage.getItem('gig_pro_v25')) || [];

    async function importarDaNuvem() {
        const titulo = document.getElementById('titulo').value;
        const artista = document.getElementById('artista').value;
        const status = document.getElementById('status');

        if (!titulo) return alert("Digite o nome da música!");

        status.innerText = "Buscando no Vagalume...";
        
        try {
            const url = `https://api.vagalume.com.br/search.php?art=${artista}&mus=${titulo}`;
            const response = await fetch(url);
            const data = await response.json();

            if (data.type === 'exact' || data.type === 'aprox') {
                document.getElementById('titulo').value = data.mus[0].name;
                document.getElementById('artista').value = data.art.name;
                document.getElementById('cifra').value = data.mus[0].text;
                status.innerText = "Sucesso! Música importada.";
            } else {
                status.innerText = "Não encontrada.";
                alert("Música não encontrada. Tente incluir o nome do artista.");
            }
        } catch (error) {
            status.innerText = "Erro de conexão com a API.";
            console.error(error);
        }
    }

    function salvar() {
        const titulo = document.getElementById('titulo').value;
        const artista = document.getElementById('artista').value;
        const cifra = document.getElementById('cifra').value;

        if(!titulo || !cifra) return alert("Preencha o título e a cifra!");

        const musica = { titulo, artista, cifra };
        repertorio.push(musica);
        localStorage.setItem('gig_pro_v25', JSON.stringify(repertorio));
        
        document.getElementById('titulo').value = '';
        document.getElementById('artista').value = '';
        document.getElementById('cifra').value = '';
        document.getElementById('status').innerText = "Música salva!";
        
        renderizar();
    }

    function renderizar() {
        const termo = document.getElementById('busca').value.toLowerCase();
        const lista = document.getElementById('lista');
        lista.innerHTML = '';

        repertorio.forEach((m, i) => {
            if(m.titulo.toLowerCase().includes(termo) || m.artista.toLowerCase().includes(termo)) {
                const card = document.createElement('div');
                card.className = 'musica-card';
                card.innerHTML = `
                    <h3>${m.titulo}</h3>
                    <p><small>${m.artista}</small></p>
                    <pre>${m.cifra}</pre>
                    <button class="btn-del" onclick="excluir(${i})">Excluir</button>
                `;
                lista.appendChild(card);
            }
        });
    }

    function excluir(i) {
        if(confirm("Remover do repertório?")) {
            repertorio.splice(i, 1);
            localStorage.setItem('gig_pro_v25', JSON.stringify(repertorio));
            renderizar();
        }
    }

    window.onload = renderizar;
</script>

</body>
</html>
