<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIG Manager V2.5 - Cloud Sync</title>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --text: #e0e0e0; --primary: #ff9800; --secondary: #00e5ff; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); padding: 20px; }
        .container { max-width: 500px; margin: auto; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; background: var(--card); border: 1px solid #333; color: white; border-radius: 8px; box-sizing: border-box; }
        .btn-group { display: flex; gap: 10px; margin: 10px 0; }
        button { flex: 1; padding: 15px; border: none; font-weight: bold; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        .btn-save { background: var(--primary); color: black; }
        .btn-cloud { background: var(--secondary); color: black; }
        .musica-card { background: var(--card); padding: 15px; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid var(--primary); }
        pre { background: #000; padding: 10px; overflow-x: auto; color: #00ff00; font-size: 14px; border-radius: 5px; }
        #status { font-size: 12px; color: var(--secondary); text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h2>🎸 GIG Manager Pro</h2>
    <p id="status">Pronto para a noite!</p>
    
    <input type="text" id="titulo" placeholder="Nome da Música">
    <input type="text" id="artista" placeholder="Artista (Opcional)">
    
    <div class="btn-group">
        <button class="btn-cloud" onclick="importarDaNuvem()">☁️ Buscar na Nuvem</button>
    </div>

    <textarea id="cifra" rows="8" placeholder="A cifra aparecerá aqui..."></textarea>
    
    <button class="btn-save" onclick="salvar()">💾 Salvar no Repertório</button>

    <hr style="margin: 30px 0; border-color: #333;">
    <input type="text" id="busca" placeholder="🔍 Filtrar repertório..." onkeyup="renderizar()">
    <div id="lista"></div>
</div>

<script>
    let repertorio = JSON.parse(localStorage.getItem('gig_pro_data')) || [];

    // FUNÇÃO DE BUSCA NA API (O CORAÇÃO DO ADS)
    async function importarDaNuvem() {
        const titulo = document.getElementById('titulo').value;
        const artista = document.getElementById('artista').value;
        const status = document.getElementById('status');

        if (!titulo) return alert("Digite ao menos o nome da música!");

        status.innerText = "Conectando ao servidor Vagalume...";
        
        try {
            // Requisição assíncrona para a API
            const url = `https://api.vagalume.com.br/search.php?art=${artista}&mus=${titulo}`;
            const response = await fetch(url);
            const data = await response.json();

            if (data.type === 'exact' || data.type === 'aprox') {
                document.getElementById('titulo').value = data.mus[0].name;
                document.getElementById('artista').value = data.art.name;
                document.getElementById('cifra').value = data.mus[0].text;
                status.innerText = "Música importada! Ajuste os acordes se necessário.";
            } else {
                status.innerText = "Música não encontrada na nuvem.";
                alert("Não encontramos essa música. Tente digitar o nome do artista também.");
            }
        } catch (error) {
            status.innerText = "Erro de conexão!";
            console.error(error);
        }
    }

    function salvar() {
        const musica = {
            titulo: document.getElementById('titulo').value,
            artista: document.getElementById('artista').value,
            cifra: document.getElementById('cifra').value
        };

        if(!musica.titulo || !musica.cifra) return alert("Preencha os campos!");

        repertorio.push(musica);
        localStorage.setItem('gig_pro_data', JSON.stringify(repertorio));
        
        document.getElementById('titulo').value = '';
        document.getElementById('artista').value = '';
        document.getElementById('cifra').value = '';
        document.getElementById('status').innerText = "Música salva localmente!";
        
        renderizar();
    }

    function renderizar() {
        const termo = document.getElementById('busca').value.toLowerCase();
        const lista = document.getElementById('lista');
        lista.innerHTML = '';

        repertorio.forEach((m, i) => {
            if(m.titulo.toLowerCase().includes(termo) || m.artista.toLowerCase().includes(termo)) {
                lista.innerHTML += `
                    <div class="musica-card">
                        <h3>${m.titulo}</h3>
                        <p>${m.artista}</p>
                        <pre>${m.cifra}</pre>
                        <button onclick="excluir(${i})" style="background:#cc0000; color:white; width:auto; padding:5px 10px;">Excluir</button>
                    </div>`;
            }
        });
    }

    function excluir(i) {
        if(confirm("Remover do repertório?")) {
            repertorio.splice(i, 1);
            localStorage.setItem('gig_pro_data', JSON.stringify(repertorio));
            renderizar();
        }
    }

    window.onload = renderizar;
</script>
</body>
</html>
